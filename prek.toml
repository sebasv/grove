[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "fmt"
name = "cargo fmt"
entry = "cargo fmt --"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "clippy"
name = "cargo clippy"
entry = "cargo clippy -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false
